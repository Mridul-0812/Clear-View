<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearView Focus Hub ⏱️</title>
    <style>
        :root {
            --accent-color: #6366f1; 
            --accent-hover: #4f46e5;
            --panic-color: #ef4444;
            --success-color: #10b981;
            --warn-color: #f59e0b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-image 0.5s ease-in-out;
        }

        .bg-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.2s ease;
        }

        .bg-switcher:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); border-color: rgba(255, 255, 255, 0.4); }
            50% { box-shadow: 0 20px 50px rgba(99, 102, 241, 0.35); border-color: rgba(99, 102, 241, 0.6); }
        }

        @keyframes microWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-0.5deg); }
            75% { transform: rotate(0.5deg); }
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #1e293b;
            text-align: center;
            box-sizing: border-box;
            margin: 20px;
            position: relative;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center;
            overflow: hidden;
        }

        .glass-container.active-focus {
            animation: pulseGlow 2.5s infinite ease-in-out, microWiggle 6s infinite ease-in-out;
            background: rgba(255, 255, 255, 0.55);
        }

        /* Whimsical Minimize Window State Modification */
        .glass-container.minimized-state {
            max-width: 280px;
            padding: 15px 25px;
            border-radius: 50px;
            background: rgba(15, 23, 42, 0.85);
            color: #f8fafc;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: none;
        }

        .glass-container.minimized-state header,
        .glass-container.minimized-state footer,
        .glass-container.minimized-state .tab-nav,
        .glass-container.minimized-state .input-group,
        .glass-container.minimized-state .vibe-badge,
        .glass-container.minimized-state .btn-row,
        .glass-container.minimized-state .inner-card {
            display: none !important;
        }

        /* Minimize / Window Control Button Block */
        .window-controls {
            position: absolute;
            top: 20px;
            left: 25px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .control-btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            position: relative;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .control-btn:hover {
            transform: scale(1.2);
        }

        .control-btn.minimize {
            background-color: #f59e0b; /* Whimsical Amber Window Action Button */
        }
        
        .control-btn.minimize::before {
            content: '';
            width: 6px;
            height: 1.5px;
            background-color: rgba(0,0,0,0.5);
            display: block;
        }

        /* Custom design tweaks inside compact mini state */
        .mini-capsule-display {
            display: none;
        }

        .glass-container.minimized-state .mini-capsule-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            font-weight: bold;
        }

        .glass-container.minimized-state .mini-capsule-display span {
            font-size: 1.3rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
        }

        .mini-expand-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .mini-expand-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .logo-text {
            font-family: 'Georgia', cursive, serif;
            font-style: italic;
            font-size: 3.2rem;
            margin: 0;
            font-weight: 500;
            color: #1e293b;
            letter-spacing: -1px;
        }

        header p {
            color: #475569;
            margin-bottom: 25px;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.05);
            padding: 5px;
            border-radius: 30px;
        }

        .tab-btn {
            background: transparent;
            color: #475569;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: 0.2s;
            flex: 1;
        }

        .tab-btn.active {
            background-color: white;
            color: var(--accent-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .inner-card {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .time-display {
            font-size: 4.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            margin: 10px 0;
            letter-spacing: -2px;
            background: linear-gradient(45deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.3s ease;
        }

        .glass-container.active-focus .time-display {
            background: linear-gradient(45deg, #4f46e5, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: scale(1.03);
        }

        .vibe-badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.06);
            color: #475569;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .vibe-badge.vibe-running {
            background: rgba(99, 102, 241, 0.15);
            color: #4f46e5;
        }

        .vibe-badge.vibe-paused {
            background: rgba(245, 158, 11, 0.15);
            color: #d97706;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .input-group div {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.72rem;
            font-weight: 700;
            color: #475569;
            gap: 4px;
        }

        input[type="number"] {
            width: 70px;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--accent-color);
            background: white;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button.action-btn {
            flex: 1;
            max-width: 130px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button.action-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        button.action-btn:active {
            transform: translateY(1px);
        }

        button.stop-btn {
            background-color: var(--panic-color);
        }
        button.stop-btn:hover {
            background-color: #dc2626;
        }

        button.reset-btn {
            background-color: #64748b;
        }
        button.reset-btn:hover {
            background-color: #475569;
        }

        footer p {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 25px;
            margin-bottom: 0;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .back-link:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <button class="bg-switcher" id="bg-btn" title="Change Wallpaper">🖼️</button>

    <div class="glass-container" id="main-hub-card">
        <div class="window-controls">
            <button class="control-btn minimize" id="minimize-trigger" title="Minimize to Floating Pill Widget"></button>
        </div>

        <div class="mini-capsule-display">
            <span id="mini-timer-text">⚡ Focus Hub Active</span>
            <button class="mini-expand-btn" id="expand-trigger" title="Expand Framework">展开 ⤢</button>
        </div>

        <header>
            <h1 class="logo-text">Focus Hub</h1>
            <p>CRUSH YOUR SYLLABUS BLOCKS.</p>
            
            <nav class="tab-nav">
                <button class="tab-btn active" id="btn-timer-tab" onclick="openTab(event, 'timer-tab')">Study Timer</button>
                <button class="tab-btn" id="btn-sw-tab" onclick="openTab(event, 'stopwatch-tab')">Stopwatch</button>
            </nav>
        </header>

        <main>
            <section id="timer-tab" class="tab-content active">
                <div class="inner-card">
                    <div class="input-group" id="timer-inputs">
                        <div>
                            <input type="number" id="timer-hr" min="0" max="24" value="0" placeholder="HH">
                            <span>HOURS</span>
                        </div>
                        <div>
                            <input type="number" id="timer-min" min="0" max="59" value="0" placeholder="MM">
                            <span>MINUTES</span>
                        </div>
                        <div>
                            <input type="number" id="timer-sec" min="0" max="59" value="0" placeholder="SS">
                            <span>SECONDS</span>
                        </div>
                    </div>
                    
                    <div class="time-display" id="timer-display">00:00:00</div>
                    <div class="vibe-badge" id="timer-vibe">🛋️ Procrastination Mode</div>
                    
                    <div class="btn-row">
                        <button class="action-btn" id="timer-start-btn">Start</button>
                        <button class="action-btn reset-btn" id="timer-reset-btn">Reset</button>
                    </div>
                </div>
            </section>

            <section id="stopwatch-tab" class="tab-content">
                <div class="inner-card">
                    <div class="time-display" id="stopwatch-display">00:00.00</div>
                    <div class="vibe-badge" id="sw-vibe">🧊 Standing Still</div>
                    
                    <div class="btn-row">
                        <button class="action-btn" id="sw-start-btn">Start</button>
                        <button class="action-btn reset-btn" id="sw-reset-btn">Reset</button>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <a href="index.html" class="back-link">← Return to Survival Dashboard</a>
            <p>Made with ☕ and a mutual hatred of band descriptors.</p>
        </footer>
    </div>

    <script>
        const hubCard = document.getElementById('main-hub-card');
        const minTrigger = document.getElementById('minimize-trigger');
        const expTrigger = document.getElementById('expand-trigger');
        const miniText = document.getElementById('mini-timer-text');

        // ==========================================
        // WHIMSICAL MINIMIZE SYSTEM CONTROLLER
        // ==========================================
        minTrigger.addEventListener('click', () => {
            hubCard.classList.add('minimized-state');
            updateMiniCapsuleText();
        });

        expTrigger.addEventListener('click', () => {
            hubCard.classList.remove('minimized-state');
        });

        function updateMiniCapsuleText() {
            const isTimerActiveTab = document.getElementById('timer-tab').classList.contains('active');
            if (isTimerActiveTab) {
                miniText.textContent = "⏱️ " + document.getElementById('timer-display').textContent;
            } else {
                miniText.textContent = "⚡ " + document.getElementById('stopwatch-display').textContent;
            }
        }

        // Tab Switching Actions
        function openTab(evt, tabName) {
            const tabcontent = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove("active");
            }
            const tablinks = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            
            syncCardGlowState();
        }

        function syncCardGlowState() {
            const isTimerActiveTab = document.getElementById('timer-tab').classList.contains('active');
            if ((isTimerActiveTab && isTimerRunning) || (!isTimerActiveTab && isStopwatchRunning)) {
                hubCard.classList.add('active-focus');
            } else {
                hubCard.classList.remove('active-focus');
            }
        }

        // Playful Commentary Phrases
        const timerPhrases = [
            "🔥 Melting down the syllabus...",
            "🚀 Bypassing cohort averages...",
            "🧠 Brain cells firing at 110%!",
            "📚 Ingesting data structures...",
            "🎯 Deep inside the matrix...",
            "🧬 Altering your academic DNA...",
            "🛡️ Resisting NESA curve scaling..."
        ];

        const stopwatchPhrases = [
            "🏃 Speedrunning execution!",
            "⏱️ Racing the persistent scaling desk...",
            "⚡ Collecting pure momentum tokens...",
            "🌋 Cooking a perfect Band 6 synthesis...",
            "💎 Unbreakable focus sequence active..."
        ];

        function getRandomPhrase(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        // ==========================================
        // COUNTDOWN STUDY TIMER MODULE (HH:MM:SS)
        // ==========================================
        let timerInterval = null;
        let timerDurationRemaining = 0; 
        let isTimerRunning = false;
        let timerPhraseInterval = null;

        const timerDisplay = document.getElementById('timer-display');
        const timerStartBtn = document.getElementById('timer-start-btn');
        const timerResetBtn = document.getElementById('timer-reset-btn');
        const timerHrInput = document.getElementById('timer-hr');
        const timerMinInput = document.getElementById('timer-min');
        const timerSecInput = document.getElementById('timer-sec');
        const timerVibe = document.getElementById('timer-vibe');

        function formatTime(totalSeconds) {
            const hrs = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            const str = formatTime(timerDurationRemaining);
            timerDisplay.textContent = str;
            if(hubCard.classList.contains('minimized-state')) {
                updateMiniCapsuleText();
            }
        }

        timerStartBtn.addEventListener('click', () => {
            if (isTimerRunning) {
                clearInterval(timerInterval);
                clearInterval(timerPhraseInterval);
                isTimerRunning = false;
                timerStartBtn.textContent = 'Start';
                timerStartBtn.classList.remove('stop-btn');
                timerVibe.textContent = "⏸️ NESA is watching you stretch...";
                timerVibe.className = "vibe-badge vibe-paused";
                syncCardGlowState();
            } else {
                if (timerDurationRemaining <= 0) {
                    const hrs = parseInt(timerHrInput.value) || 0;
                    const mins = parseInt(timerMinInput.value) || 0;
                    const secs = parseInt(timerSecInput.value) || 0;
                    timerDurationRemaining = (hrs * 3600) + (mins * 60) + secs;
                }

                if (timerDurationRemaining <= 0) {
                    timerVibe.textContent = "❌ Feed me some actual numbers first!";
                    return; 
                }

                isTimerRunning = true;
                timerStartBtn.textContent = 'Pause';
                timerStartBtn.classList.add('stop-btn');
                
                timerVibe.textContent = getRandomPhrase(timerPhrases);
                timerVibe.className = "vibe-badge vibe-running";
                syncCardGlowState();

                timerPhraseInterval = setInterval(() => {
                    timerVibe.textContent = getRandomPhrase(timerPhrases);
                }, 7000);

                timerInterval = setInterval(() => {
                    timerDurationRemaining--;
                    updateTimerDisplay();

                    if (timerDurationRemaining <= 0) {
                        clearInterval(timerInterval);
                        clearInterval(timerPhraseInterval);
                        isTimerRunning = false;
                        timerStartBtn.textContent = 'Start';
                        timerStartBtn.classList.remove('stop-btn');
                        timerVibe.textContent = "🏆 ABSOLUTE BAND 6 ENERGY UNLOCKED!";
                        timerVibe.className = "vibe-badge";
                        syncCardGlowState();
                        if(hubCard.classList.contains('minimized-state')) {
                            hubCard.classList.remove('minimized-state');
                        }
                        alert("🎉 Study block completed! Step away from the desk immediately.");
                    }
                }, 1000);
            }
        });

        timerResetBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            clearInterval(timerPhraseInterval);
            isTimerRunning = false;
            timerDurationRemaining = 0;
            
            timerHrInput.value = 0;
            timerMinInput.value = 0;
            timerSecInput.value = 0;
            
            timerDisplay.textContent = "00:00:00";
            timerStartBtn.textContent = 'Start';
            timerStartBtn.classList.remove('stop-btn');
            timerVibe.textContent = "🛋️ Procrastination Mode";
            timerVibe.className = "vibe-badge";
            syncCardGlowState();
            updateMiniCapsuleText();
        });

        // ==========================================
        // TRACKING STOPWATCH MODULE
        // ==========================================
        let stopwatchInterval = null;
        let stopwatchStartTime = 0;
        let stopwatchElapsedTime = 0;
        let isStopwatchRunning = false;
        let swPhraseInterval = null;

        const swDisplay = document.getElementById('stopwatch-display');
        const swStartBtn = document.getElementById('sw-start-btn');
        const swResetBtn = document.getElementById('sw-reset-btn');
        const swVibe = document.getElementById('sw-vibe');

        function formatStopwatch(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            const centiseconds = Math.floor((ms % 1000) / 10);
            
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${centiseconds.toString().padStart(2, '0')}`;
        }

        swStartBtn.addEventListener('click', () => {
            if (isStopwatchRunning) {
                clearInterval(stopwatchInterval);
                clearInterval(swPhraseInterval);
                stopwatchElapsedTime += Date.now() - stopwatchStartTime;
                isStopwatchRunning = false;
                swStartBtn.textContent = 'Start';
                swStartBtn.classList.remove('stop-btn');
                swVibe.textContent = "⏸️ Momentum Checked.";
                swVibe.className = "vibe-badge vibe-paused";
                syncCardGlowState();
            } else {
                isStopwatchRunning = true;
                swStartBtn.textContent = 'Pause';
                swStartBtn.classList.add('stop-btn');
                stopwatchStartTime = Date.now();

                swVibe.textContent = getRandomPhrase(stopwatchPhrases);
                swVibe.className = "vibe-badge vibe-running";
                syncCardGlowState();

                swPhraseInterval = setInterval(() => {
                    swVibe.textContent = getRandomPhrase(stopwatchPhrases);
                }, 6000);

                stopwatchInterval = setInterval(() => {
                    const currentElapsed = stopwatchElapsedTime + (Date.now() - stopwatchStartTime);
                    swDisplay.textContent = formatStopwatch(currentElapsed);
                    if(hubCard.classList.contains('minimized-state')) {
                        updateMiniCapsuleText();
                    }
                }, 10); 
            }
        });

        swResetBtn.addEventListener('click', () => {
            clearInterval(stopwatchInterval);
            clearInterval(swPhraseInterval);
            isStopwatchRunning = false;
            stopwatchElapsedTime = 0;
            swStartBtn.textContent = 'Start';
            swStartBtn.classList.remove('stop-btn');
            swDisplay.textContent = "00:00.00";
            swVibe.textContent = "🧊 Standing Still";
            swVibe.className = "vibe-badge";
            syncCardGlowState();
            updateMiniCapsuleText();
        });

        // ==========================================
        // DYNAMIC WALLPAPER ENGINE
        // ==========================================
        const bgButton = document.getElementById('bg-btn');
        if (bgButton) {
            bgButton.addEventListener('click', () => {
                const randomId = Date.now(); 
                const newBgUrl = `https://picsum.photos/1920/1080?random=${randomId}`;
                
                const img = new Image();
                img.src = newBgUrl;
                img.onload = () => {
                    document.body.style.backgroundImage = `url('${newBgUrl}')`;
                };
            });
        }
    </script>
</body>
</html>
